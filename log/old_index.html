<!DOCTYPE html>
<html>
<head>
<style>
.fixed-width-text {
  font-family: 'courier';
  font-size: 14pt;
}
</style>
<script src="https://cdn.firebase.com/js/client/2.2.0/firebase.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
<script>

var firebase,  /* connection to firebase/log */
    auth,      /* authentication data -- undefined until user authenticates */
    user,      /* firebase/log/$auth.userid -- undefined until user authenticates */
    posts;     /* firebase/log/$auth.userid/posts -- */

function authenticate() {
  firebase.authWithOAuthPopup('google', function(error, authData) {
    if (error) {
      console.log('Login Failed!', error);
    } else {
      console.log('Authenticated successfully with payload:', authData);
      auth = authData;
      post_authentication_initialization();
    }
  });
}

function post_authentication_initialization() {
  $('#login-name').text(auth.google.displayName);

  user = firebase.child('users').child(auth.uid);
  user.transaction(function(value) {
    return value || {'posts':{}};
  });

  posts = user.child('posts');

  refresh_search_results();

  $('#not-logged-in').css('display', 'none');
  $('#logged-in').css('display', 'block');
}

function date_string_to_timestamp(date_string) {
  return new Date(date_string.replace('-', '/')).getTime();
}

function refresh_search_results() {

  var start_time = date_string_to_timestamp($('#posts-search-start-date').val());
  var end_time = date_string_to_timestamp($('#posts-search-end-date').val());
  var query_tags = $('#posts-search-tags').val().split(/\s+/).filter(function(s) {return s;});

  posts.off();

  $('#posts-search-results').empty();

  posts
    .orderByChild('timestamp')
    .startAt(start_time).endAt(end_time)
    .on('child_added', function(snapshot) {
      var post = snapshot.val();
      var post_tags = post.tags.split(/\s+/).filter(function(s) {return s;});

      if (query_tags.some(function(query_tag) {
        return post_tags.indexOf(query_tag) === -1;
      })) return;

      display_new_post(post);
    });
}

function display_new_post(post) {
  var body_dom = $('<pre>');
  body_dom.text(post.body);

  var tags_dom = $('<pre>');
  tags_dom.text('#### tags: ' + post.tags);

  var date_dom = $('<pre>');
  date_dom.text('#### timestamp: ' + new Date(post.timestamp));

  var post_dom = $('<div>');
  post_dom.append(body_dom);
  post_dom.append(tags_dom);
  post_dom.append(date_dom);

  $('#posts-search-results').prepend(post_dom);
}

function post_new_post() {
  /* de facto Schema */
  posts.push({
    timestamp: Firebase.ServerValue.TIMESTAMP,
    body: $('#new-post-body').val(),
    tags: $('#new-post-tags').val()
  });

  $('#new-post-body').val('');
  $('#new-post-body').focus();
}

function relative_date_ISO_String(dx) {
  var date = new Date();
  date.setDate(date.getDate() + dx);
  return date.toISOString().slice(0, 10);
}

$(document).ready(function() {
  $('#posts-search-start-date').val(relative_date_ISO_String(-3));
  $('#posts-search-end-date').val(relative_date_ISO_String(3));

  firebase = new Firebase('https://intense-inferno-6472.firebaseio.com/log');
  if (auth = firebase.getAuth())
    post_authentication_initialization();
});

</script>
</head>
<body>

<div id="not-logged-in">
  <button onclick="authenticate()">Log in</button>
</div>

<div id="logged-in" style="display:none">
  <!-- header message -->
  <p>You're logged in as <span id="login-name"></span>.</p>

  <!-- new post stuff -->
  <div>
    <div><textarea id="new-post-body" rows="12" cols="80"></textarea></div>
    <div><input id="new-post-tags" type="text"></div>
    <div><button onclick="post_new_post()">New Post</button></div>
  </div>

  <!-- post search -->
  <div>
    <p>Search</p>
    <div>
      <input id="posts-search-start-date" onchange="refresh_search_results()" type="date">
      <input id="posts-search-end-date" onchange="refresh_search_results()" type="date">
      <input id="posts-search-tags" onchange="refresh_search_results()" type="text">
    </div>
    <div id="posts-search-results"></div>
  </div>

</div>
</body>
</html>
